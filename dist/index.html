<body>

  <div class="content">

  </main>

  <script>
    // Initialize menu (injects menu if needed and sets up all logic)
    if (typeof initMenu === 'function') {
      initMenu();
    } else {
      // If menu.js is not loaded yet, wait for it

        if (typeof initMenu === 'function') initMenu();
      });
    }
  </script>
